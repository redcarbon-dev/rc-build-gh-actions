name: "RC Docker Build"
description: "Build Docker for RedCarbon"
inputs:
  docker-registry:
    description: "Docker Registry"
    required: true
  docker-base-image-path:
    description: "Docker Base Image Path"
    required: true
  docker-target:
    description: "Docker Target"
    required: true
  docker-context:
    description: "Docker Context Path"
    required: true
    default: "."
  google-credentials:
    description: "Google Credentials"
    required: true
  branch:
    description: "Git Branch"
    required: true
  ts:
    description: "Build Timestamp"
    required: true
  sha:
    description: "Git SHA"
    required: true
  push:
    description: "Push to registry"
    required: false
    default: false
  build-args:
    description: "List of build-time variables"
    required: false
  go-cache-bucket:
    description: "GCS bucket for the shared Go build cache (GOCACHEPROG). When set, its name is passed as the GO_CACHE_BUCKET build-arg and a short-lived access token is passed as the `gcs_token` build SECRET so the in-image `go build` can use the remote cache. Empty (default) disables it."
    required: false
    default: ""
  file:
    description: "Path to the Dockerfile."
    required: false
  kms-key:
    description: "GCP KMS key path for signing"
    required: false
    default: "gcpkms://projects/redcarbon-bb8b2/locations/global/keyRings/sbom-slsa-keyring/cryptoKeys/sbom-slsa-key-feaf3d5"
  docker-network:
    description: "Docker build network mode (e.g., host, bridge, none)"
    required: false
    default: "host"
  enable-signing:
    description: "Enable SBOM generation and image signing"
    required: false
    default: "false"
  tag:
    description: "Optional additional tag for the image (e.g. v1.0.1)"
    required: false
outputs:
  digest:
    description: "Docker Digest"
    value: ${{ steps.docker_build.outputs.digest }}
  image-tags:
    description: "Generated image tags"
    value: ${{ steps.docker_meta.outputs.tags }}
  image:
    description: "Full image reference with digest"
    value: ${{ steps.image-var.outputs.image }}
runs:
  using: "composite"
  steps:
    - name: Validate inputs
      run: |
        if [[ ! "${{ inputs.sha }}" =~ ^[a-f0-9]{7,40}$ ]]; then
          echo "::error::Invalid SHA format: ${{ inputs.sha }}"
          exit 1
        fi
        if [[ -z "${{ inputs.docker-registry }}" ]]; then
          echo "::error::docker-registry is required"
          exit 1
        fi
      shell: bash
    - name: Install Cosign
      uses: sigstore/cosign-installer@v4.1.2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4.1.0
    - name: Docker meta
      id: docker_meta
      uses: docker/metadata-action@v6.2.0
      with:
        images: |
          ${{ inputs.docker-registry }}/${{ inputs.docker-base-image-path }}/${{ github.repository }}/${{ inputs.docker-target }}
        tags: |
          type=sha
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}} 
          type=raw,value=${{ inputs.branch }}-${{ inputs.sha }}-${{ inputs.ts }}
          type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
    - id: "auth"
      name: "Authenticate to Google Cloud"
      uses: "google-github-actions/auth@v3.0.0"
      with:
        credentials_json: "${{ inputs.google-credentials }}"
        token_format: "access_token"
    - name: Log in to the Container registry
      uses: docker/login-action@v4.2.0
      with:
        registry: "${{ inputs.docker-registry }}"
        username: "oauth2accesstoken"
        password: "${{ steps.auth.outputs.access_token }}"
    - name: Compute cache scope
      id: cache_scope
      # The buildx registry cache must be scoped per REPOSITORY, not only per
      # docker-target: targets with the same name in different repos (e.g.
      # `production` in rc-engine and rc-carbonpedia) would otherwise overwrite
      # each other's cache on every push. Unlike the image path (where
      # docker/metadata-action lowercases for us), this ref reaches buildx
      # verbatim and Docker refs must be lowercase — hence the ${VAR,,}.
      run: echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      shell: bash
    - name: Build and push
      id: docker_build
      uses: docker/build-push-action@v7.2.0
      with:
        push: ${{ inputs.push }}
        network: ${{ inputs.docker-network }}
        tags: ${{ steps.docker_meta.outputs.tags }}
        labels: ${{ steps.docker_meta.outputs.labels }}
        target: ${{ inputs.docker-target }}
        context: ${{ inputs.docker-context }}
        build-args: |
          ${{ inputs.build-args }}
          GO_CACHE_BUCKET=${{ inputs.go-cache-bucket }}
        # Short-lived OAuth access token for the in-image GOCACHEPROG remote
        # build cache (rc-ws). Passed as a build SECRET — mounted on tmpfs only
        # for the RUN that requests it and excluded from image layers, never a
        # build-arg. GitHub masks this value in logs. Images that don't mount
        # `gcs_token` simply ignore it.
        secrets: |
          gcs_token=${{ steps.auth.outputs.access_token }}
        file: ${{ inputs.file }}
        # The second cache-from is the legacy shared (pre-per-repo) ref, kept as
        # a read-only fallback so the first build after this change is not cold;
        # nothing writes it anymore, so Artifact Registry retention ages it out.
        # Drop it in a future bump.
        cache-from: |
          type=registry,ref=${{ inputs.docker-registry }}/${{ inputs.docker-base-image-path }}/cache/${{ steps.cache_scope.outputs.repo }}/${{ inputs.docker-target }}
          type=registry,ref=${{ inputs.docker-registry }}/${{ inputs.docker-base-image-path }}/cache/${{ inputs.docker-target }}
        cache-to: type=registry,ref=${{ inputs.docker-registry }}/${{ inputs.docker-base-image-path }}/cache/${{ steps.cache_scope.outputs.repo }}/${{ inputs.docker-target }},mode=max
    - name: Get Image Var
      id: image-var
      if: ${{ inputs.push == 'true' && inputs.enable-signing == 'true' }}
      run: |
        echo "image=${{ inputs.docker-registry }}/${{ inputs.docker-base-image-path }}/${{ github.repository }}/${{ inputs.docker-target }}@${{ steps.docker_build.outputs.digest }}" >> "$GITHUB_OUTPUT"
      shell: bash
    - name: Generate SBOM
      id: sbom
      if: ${{ inputs.push == 'true' && inputs.enable-signing == 'true' }}
      uses: anchore/sbom-action@v0.24.0
      with:
        image: ${{ steps.image-var.outputs.image }}
        artifact-name: sbom.spdx
        output-file: ./sbom.spdx
    - name: Sign image with a key
      id: sign
      if: ${{ inputs.push == 'true' && inputs.enable-signing == 'true' }}
      run: |
        images=""
        for tag in ${TAGS}; do
          images+="${tag}@${DIGEST} "
        done
        cosign sign --yes --key ${{ inputs.kms-key }} ${images} --tlog-upload=false
        cosign attest --predicate sbom.spdx --key ${{ inputs.kms-key }} ${images} --tlog-upload=false
      shell: bash
      env:
        TAGS: ${{ steps.docker_meta.outputs.tags }}
        DIGEST: ${{ steps.docker_build.outputs.digest }}
